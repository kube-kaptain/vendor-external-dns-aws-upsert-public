# Source: external-dns/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-external-dns-aws-upsert-public
  namespace: ${Environment}
  labels:
    app.kubernetes.io/name: vendor-external-dns-aws-upsert-public
    app.kubernetes.io/instance: vendor-external-dns-aws-upsert-public
    app.kubernetes.io/version: "${Version}"
    app.kubernetes.io/managed-by: Kaptain
    app: vendor-external-dns-aws-upsert-public
    app.kubernetes.io/part-of: ${ProductName}
    kaptain.org/environment: ${Environment}
    kaptain.org/product: ${ProductName}
    kaptain.org/project-name: ${ProjectName}
    kaptain.org/version: "${Version}"
    kaptain.org/owner: kube-kaptain
  annotations:
    kaptain.org/helm-upstream-chart: external-dns-1.21.1
    kaptain.org/generated-by: Generated by Kaptain vendor-helm-render-and-process
    kaptain.org/source-repository: kube-kaptain/vendor-external-dns-aws-upsert-public
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${ProjectName}
      app.kubernetes.io/instance: vendor-external-dns-aws-upsert-public
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${ProjectName}
        app.kubernetes.io/instance: vendor-external-dns-aws-upsert-public
    spec:
      automountServiceAccountToken: true
      serviceAccountName: vendor-external-dns-aws-upsert-public
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: external-dns
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          image: ${VendorExternalDnsAwsUpsertPublic/EnvironmentDockerRegistryAndNamespace}/${DockerImageName}:${DockerTagExternalDns}
          imagePullPolicy: IfNotPresent
          args:
            - --log-level=${VendorExternalDnsAwsUpsertPublic/LogLevel}
            - --log-format=${VendorExternalDnsAwsUpsertPublic/LogFormat}
            - --interval=${VendorExternalDnsAwsUpsertPublic/Interval}
            - --source=service
            - --source=ingress
            - --source=crd
            - --policy=upsert-only
            - --registry=txt
            - --txt-owner-id=${ProjectName}
            - --managed-record-types=A
            - --managed-record-types=AAAA
            - --managed-record-types=CNAME
            - --managed-record-types=MX
            - --managed-record-types=NS
            - --managed-record-types=PTR
            - --managed-record-types=SRV
            - --managed-record-types=TXT
            - --provider=aws
            - --aws-zone-type=public
            - --txt-prefix=_${ProjectName}.
            - ${VendorExternalDnsAwsUpsertPublic/EventsFlag}
            - --min-event-sync-interval=${VendorExternalDnsAwsUpsertPublic/MinEventSyncInterval}
            - --aws-zones-cache-duration=${VendorExternalDnsAwsUpsertPublic/AwsZonesCacheDuration}
            - --aws-evaluate-target-health
            - --min-ttl=${VendorExternalDnsAwsUpsertPublic/MinTtl}
            - --namespace=${VendorExternalDnsAwsUpsertPublic/Namespace}
          ports:
            - name: http
              protocol: TCP
              containerPort: 7979
          livenessProbe:
            failureThreshold: ${VendorExternalDnsAwsUpsertPublic/ProbeLivenessFailureThreshold}
            httpGet:
              path: /healthz
              port: http
            periodSeconds: ${VendorExternalDnsAwsUpsertPublic/ProbeLivenessPeriod}
            timeoutSeconds: ${VendorExternalDnsAwsUpsertPublic/ProbeTimeoutSeconds}
          readinessProbe:
            failureThreshold: ${VendorExternalDnsAwsUpsertPublic/ProbeReadinessFailureThreshold}
            httpGet:
              path: /healthz
              port: http
            periodSeconds: ${VendorExternalDnsAwsUpsertPublic/ProbeReadinessPeriod}
            successThreshold: ${VendorExternalDnsAwsUpsertPublic/ProbeReadinessSuccessThreshold}
            timeoutSeconds: ${VendorExternalDnsAwsUpsertPublic/ProbeTimeoutSeconds}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: ${VendorExternalDnsAwsUpsertPublic/ProbeStartupPeriod}
            timeoutSeconds: ${VendorExternalDnsAwsUpsertPublic/ProbeTimeoutSeconds}
            failureThreshold: ${VendorExternalDnsAwsUpsertPublic/ProbeStartupFailureThreshold}
          resources:
            requests:
              cpu: "${VendorExternalDnsAwsUpsertPublic/CpuRequest}"
              memory: "${VendorExternalDnsAwsUpsertPublic/Memory}"
            limits:
              memory: "${VendorExternalDnsAwsUpsertPublic/Memory}"
          env:
            - name: GOMEMLIMIT
              value: ${VendorExternalDnsAwsUpsertPublic/GoMemLimit}
