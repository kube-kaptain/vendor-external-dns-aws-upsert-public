# Source: external-dns/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-external-dns-aws-upsert-public
  namespace: ${Environment}
  labels:
    app.kubernetes.io/name: vendor-external-dns-aws-upsert-public
    app.kubernetes.io/instance: vendor-external-dns-aws-upsert-public
    app.kubernetes.io/version: "${Version}"
    app.kubernetes.io/managed-by: Kaptain
    app: vendor-external-dns-aws-upsert-public
    app.kubernetes.io/part-of: ${ProductName}
    kaptain.org/environment: ${Environment}
    kaptain.org/product: ${ProductName}
    kaptain.org/project-name: ${ProjectName}
    kaptain.org/version: "${Version}"
    kaptain.org/owner: kube-kaptain
  annotations:
    kaptain.org/helm-upstream-chart: external-dns-1.21.1
    kaptain.org/generated-by: Generated by Kaptain vendor-helm-render-and-process
    kaptain.org/source-repository: kube-kaptain/vendor-external-dns-aws-upsert-public
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ${ProjectName}
      app.kubernetes.io/instance: vendor-external-dns-aws-upsert-public
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${ProjectName}
        app.kubernetes.io/instance: vendor-external-dns-aws-upsert-public
    spec:
      automountServiceAccountToken: true
      serviceAccountName: vendor-external-dns-aws-upsert-public
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: external-dns
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
          imagePullPolicy: IfNotPresent
          args:
            - --log-level=${VendorExternalDnsAwsUpsertPublic/LogLevel}
            - --log-format=${VendorExternalDnsAwsUpsertPublic/LogFormat}
            - --interval=${VendorExternalDnsAwsUpsertPublic/Interval}
            - --source=service
            - --source=ingress
            - --source=crd
            - --policy=upsert-only
            - --registry=txt
            - --txt-owner-id=${ProjectName}
            - --managed-record-types=A
            - --managed-record-types=AAAA
            - --managed-record-types=CNAME
            - --managed-record-types=MX
            - --managed-record-types=NS
            - --managed-record-types=PTR
            - --managed-record-types=SRV
            - --managed-record-types=TXT
            - --provider=aws
            - --aws-zone-type=public
            - --txt-prefix=_${ProjectName}.
            - --events=${VendorExternalDnsAwsUpsertPublic/Events}
            - --min-event-sync-interval=${VendorExternalDnsAwsUpsertPublic/MinEventSyncInterval}
            - --aws-zones-cache-duration=${VendorExternalDnsAwsUpsertPublic/AwsZonesCacheDuration}
            - --aws-evaluate-target-health=${VendorExternalDnsAwsUpsertPublic/AwsEvaluateTargetHealth}
            - --min-ttl=${VendorExternalDnsAwsUpsertPublic/MinTtl}
            - --namespace=${VendorExternalDnsAwsUpsertPublic/Namespace}
          ports:
            - name: http
              protocol: TCP
              containerPort: 7979
          livenessProbe:
            failureThreshold: 2
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
