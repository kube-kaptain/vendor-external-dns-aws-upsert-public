apiVersion: kaptain.org/1.18
kind: kubernetes-bundle-vendor-helm-rendered
metadata:
  description: "Vendored ExternalDNS for AWS Route 53 public zones (upsert-only policy)"

spec:
  layers:
    - layer-github-flow-strict:[1.3,2.0)
  main:
    vendorHelmRendered:
      repoUrl: 'https://kubernetes-sigs.github.io/external-dns/'
      chartName: 'external-dns'
      moveFiles:
        - source: 'templates/serviceaccount.yaml'
          destination: 'serviceaccount.yaml'
        - source: 'templates/clusterrole.yaml'
          destination: 'clusterrole.yaml'
        - source: 'templates/clusterrolebinding.yaml'
          destination: 'clusterrolebinding.yaml'
        - source: 'templates/deployment.yaml'
          destination: 'deployment.yaml'
        - source: 'templates/service.yaml'
          destination: 'service.yaml'
      sedReplace:
        perFile:
          - file: 'deployment.yaml'
            patterns:
              - 's|--log-level=info|--log-level=${VendorExternalDnsAwsUpsertPublic/LogLevel}|'
              - 's|--log-format=text|--log-format=${VendorExternalDnsAwsUpsertPublic/LogFormat}|'
              - 's|--interval=1m|--interval=${VendorExternalDnsAwsUpsertPublic/Interval}|'
      yqTransform:
        perFile:
          - file: 'clusterrole.yaml'
            expressions:
              - '.metadata.name = "${Environment}." + .metadata.name'
          - file: 'clusterrolebinding.yaml'
            expressions:
              - '.metadata.name |= sub("-viewer$", "")'
              - '.metadata.name = "${Environment}." + .metadata.name'
              - '.roleRef.name = "${Environment}." + .roleRef.name'
          - file: 'deployment.yaml'
            expressions:
              - '.spec.template.spec.containers[].args[] style=""'
              - 'del(.spec.template.spec.containers[0].livenessProbe.initialDelaySeconds)'
              - 'del(.spec.template.spec.containers[0].livenessProbe.successThreshold)'
              - 'del(.spec.template.spec.containers[0].readinessProbe.initialDelaySeconds)'
              - '.spec.template.spec.containers[0].livenessProbe.periodSeconds = "${VendorExternalDnsAwsUpsertPublic/ProbeLivenessPeriod}" | .spec.template.spec.containers[0].livenessProbe.periodSeconds style=""'
              - '.spec.template.spec.containers[0].livenessProbe.timeoutSeconds = "${VendorExternalDnsAwsUpsertPublic/ProbeTimeoutSeconds}" | .spec.template.spec.containers[0].livenessProbe.timeoutSeconds style=""'
              - '.spec.template.spec.containers[0].livenessProbe.failureThreshold = "${VendorExternalDnsAwsUpsertPublic/ProbeLivenessFailureThreshold}" | .spec.template.spec.containers[0].livenessProbe.failureThreshold style=""'
              - '.spec.template.spec.containers[0].readinessProbe.periodSeconds = "${VendorExternalDnsAwsUpsertPublic/ProbeReadinessPeriod}" | .spec.template.spec.containers[0].readinessProbe.periodSeconds style=""'
              - '.spec.template.spec.containers[0].readinessProbe.timeoutSeconds = "${VendorExternalDnsAwsUpsertPublic/ProbeTimeoutSeconds}" | .spec.template.spec.containers[0].readinessProbe.timeoutSeconds style=""'
              - '.spec.template.spec.containers[0].readinessProbe.failureThreshold = "${VendorExternalDnsAwsUpsertPublic/ProbeReadinessFailureThreshold}" | .spec.template.spec.containers[0].readinessProbe.failureThreshold style=""'
              - '.spec.template.spec.containers[0].readinessProbe.successThreshold = "${VendorExternalDnsAwsUpsertPublic/ProbeReadinessSuccessThreshold}" | .spec.template.spec.containers[0].readinessProbe.successThreshold style=""'
              - '.spec.template.spec.containers[0].startupProbe.httpGet.path = "/healthz"'
              - '.spec.template.spec.containers[0].startupProbe.httpGet.port = "http"'
              - '.spec.template.spec.containers[0].startupProbe.periodSeconds = "${VendorExternalDnsAwsUpsertPublic/ProbeStartupPeriod}" | .spec.template.spec.containers[0].startupProbe.periodSeconds style=""'
              - '.spec.template.spec.containers[0].startupProbe.timeoutSeconds = "${VendorExternalDnsAwsUpsertPublic/ProbeTimeoutSeconds}" | .spec.template.spec.containers[0].startupProbe.timeoutSeconds style=""'
              - '.spec.template.spec.containers[0].startupProbe.failureThreshold = "${VendorExternalDnsAwsUpsertPublic/ProbeStartupFailureThreshold}" | .spec.template.spec.containers[0].startupProbe.failureThreshold style=""'
              - '.spec.template.spec.containers[0].resources.requests.cpu = "${VendorExternalDnsAwsUpsertPublic/CpuRequest}" | .spec.template.spec.containers[0].resources.requests.cpu style="double"'
              - '.spec.template.spec.containers[0].resources.requests.memory = "${VendorExternalDnsAwsUpsertPublic/Memory}" | .spec.template.spec.containers[0].resources.requests.memory style="double"'
              - '.spec.template.spec.containers[0].resources.limits.memory = "${VendorExternalDnsAwsUpsertPublic/Memory}" | .spec.template.spec.containers[0].resources.limits.memory style="double"'
              - '.spec.template.spec.containers[0].env = ((.spec.template.spec.containers[0].env // []) + [{"name":"GOMEMLIMIT","value":"${VendorExternalDnsAwsUpsertPublic/GoMemLimit}"}])'
      imageRetags:
        - sourceImageUri: 'registry.k8s.io/external-dns/external-dns:v0.21.0'
          tagSuffix: 'external-dns'
    hooks:
      prePackagePrepare: .github/bin/pre-package-prepare.bash
  global:
    release:
      versioning:
        maxParts: '4'
        strategy: file-pattern-match
        patternType: custom
        source:
          subPath: src/config
          fileName: VendorHelmRenderedVersion
          pattern: '^v?([0-9]+\.[0-9]+\.[0-9]+)$'
          prefixParts: '3'
